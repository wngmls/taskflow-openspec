<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>TaskFlow — 칸반</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .card{cursor:grab;transition:opacity .15s}.card.dragging{opacity:.4}
  .col-drop{transition:background .15s}
  .col-TODO.over{background:#fef9c3}
  .col-DOING.over{background:#dbeafe}
  .col-DONE.over{background:#dcfce7}
</style>
</head>
<body class="min-h-screen bg-gray-100">
<header class="bg-white border-b px-4 py-3 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <span class="bg-teal-600 text-white font-bold px-3 py-1 rounded-lg text-sm tracking-wide">TaskFlow</span>
    <span id="teamName" class="text-sm text-gray-600 font-medium hidden md:block"></span>
  </div>
  <!-- 중앙 탭 -->
  <nav class="flex gap-1">
    <a href="/kanban.html" class="px-4 py-1.5 rounded-lg text-sm font-semibold bg-teal-600 text-white">칸반</a>
    <a href="/chat.html"   class="px-4 py-1.5 rounded-lg text-sm font-semibold text-gray-600 hover:bg-gray-100">채팅</a>
    <a href="/members.html" class="px-4 py-1.5 rounded-lg text-sm font-semibold text-gray-600 hover:bg-gray-100">멤버</a>
  </nav>
  <div class="flex items-center gap-3">
    <span id="userEmailDisplay" class="text-sm text-gray-500 hidden md:block"></span>
    <button id="logoutBtn" class="text-xs text-gray-400 hover:text-gray-600 hidden md:block">로그아웃</button>
    <button id="menuBtn" class="md:hidden text-gray-600 text-lg">☰</button>
  </div>
</header>
<!-- 모바일 메뉴 -->
<div id="mobileMenu" class="hidden fixed inset-0 z-50 bg-black bg-opacity-30" onclick="this.classList.add('hidden')">
  <div class="absolute right-0 top-0 h-full w-64 bg-white shadow-xl p-6 space-y-4" onclick="event.stopPropagation()">
    <p id="mobileUser" class="text-sm text-gray-500 border-b pb-3"></p>
    <a href="/kanban.html" class="block py-2 text-teal-600 font-semibold">📋 칸반</a>
    <a href="/chat.html"   class="block py-2 text-gray-700">💬 채팅</a>
    <a href="/members.html" class="block py-2 text-gray-700">👥 팀 멤버</a>
    <button id="mobileLogout" class="block py-2 text-gray-700">🚪 로그아웃</button>
  </div>
</div>
<!-- 필터 바 -->
<div class="bg-white border-b px-4 py-2 flex items-center justify-between">
  <div class="flex gap-1 text-sm">
    <button data-f=""           class="filter-btn px-3 py-1 rounded-lg font-semibold bg-gray-900 text-white">전체</button>
    <button data-f="me"         class="filter-btn px-3 py-1 rounded-lg text-gray-600 hover:bg-gray-100">@me</button>
    <button data-f="unassigned" class="filter-btn px-3 py-1 rounded-lg text-gray-600 hover:bg-gray-100">미할당</button>
  </div>
  <span class="text-xs text-gray-400">정렬: 최근 생성순 ▼</span>
</div>
<!-- 칸반 보드 -->
<main class="p-4 overflow-x-auto">
  <div class="flex gap-4 min-w-max md:min-w-0 md:grid md:grid-cols-3">
    <!-- TODO 컬럼 — 노란 배경 -->
    <div id="col-TODO" data-status="TODO" class="col-drop col-TODO w-72 md:w-auto bg-amber-50 rounded-xl p-3">
      <div class="flex justify-between items-center mb-3">
        <h2 class="font-bold text-amber-700">TODO · <span id="cnt-TODO">0</span></h2>
        <button data-col="TODO" class="add-btn text-amber-600 font-bold text-xl leading-none hover:text-amber-800">+</button>
      </div>
      <div id="inline-TODO" class="hidden mb-2 bg-white border-2 border-amber-300 rounded-lg p-2 space-y-2">
        <input class="inline-input w-full text-sm focus:outline-none" placeholder="태스크 제목...">
        <div class="flex items-center gap-2">
          <span class="text-xs text-gray-400">담당자:</span>
          <select class="assignee-select text-xs border rounded px-1 py-0.5 text-gray-600 focus:outline-none focus:ring-1 focus:ring-amber-400">
            <option value="">미할당</option>
            <option value="me">@me</option>
          </select>
        </div>
        <p class="text-xs text-gray-400">Enter: 저장 · Esc: 취소</p>
      </div>
      <div id="cards-TODO" class="space-y-2 min-h-8"></div>
    </div>
    <!-- DOING 컬럼 — 파란 배경 -->
    <div id="col-DOING" data-status="DOING" class="col-drop col-DOING w-72 md:w-auto bg-blue-50 rounded-xl p-3">
      <div class="flex justify-between items-center mb-3">
        <h2 class="font-bold text-blue-700">DOING · <span id="cnt-DOING">0</span></h2>
        <button data-col="DOING" class="add-btn text-blue-600 font-bold text-xl leading-none hover:text-blue-800">+</button>
      </div>
      <div id="inline-DOING" class="hidden mb-2 bg-white border-2 border-blue-300 rounded-lg p-2 space-y-2">
        <input class="inline-input w-full text-sm focus:outline-none" placeholder="태스크 제목...">
        <div class="flex items-center gap-2">
          <span class="text-xs text-gray-400">담당자:</span>
          <select class="assignee-select text-xs border rounded px-1 py-0.5 text-gray-600 focus:outline-none focus:ring-1 focus:ring-blue-400">
            <option value="">미할당</option>
            <option value="me">@me</option>
          </select>
        </div>
        <p class="text-xs text-gray-400">Enter: 저장 · Esc: 취소</p>
      </div>
      <div id="cards-DOING" class="space-y-2 min-h-8"></div>
    </div>
    <!-- DONE 컬럼 — 초록 배경 -->
    <div id="col-DONE" data-status="DONE" class="col-drop col-DONE w-72 md:w-auto bg-green-50 rounded-xl p-3">
      <div class="flex justify-between items-center mb-3">
        <h2 class="font-bold text-green-700">DONE · <span id="cnt-DONE">0</span></h2>
        <button data-col="DONE" class="add-btn text-green-600 font-bold text-xl leading-none hover:text-green-800">+</button>
      </div>
      <div id="inline-DONE" class="hidden mb-2 bg-white border-2 border-green-300 rounded-lg p-2 space-y-2">
        <input class="inline-input w-full text-sm focus:outline-none" placeholder="태스크 제목...">
        <div class="flex items-center gap-2">
          <span class="text-xs text-gray-400">담당자:</span>
          <select class="assignee-select text-xs border rounded px-1 py-0.5 text-gray-600 focus:outline-none focus:ring-1 focus:ring-green-400">
            <option value="">미할당</option>
            <option value="me">@me</option>
          </select>
        </div>
        <p class="text-xs text-gray-400">Enter: 저장 · Esc: 취소</p>
      </div>
      <div id="cards-DONE" class="space-y-2 min-h-8"></div>
    </div>
  </div>
</main>
<!-- 카드 상세 모달 -->
<div id="modal" class="hidden fixed inset-0 z-40 bg-black bg-opacity-40 flex items-center justify-center px-4">
  <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm space-y-4">
    <div class="flex justify-between items-start">
      <h3 id="modalTitle" class="font-bold text-gray-800 text-lg"></h3>
      <button id="modalClose" class="text-gray-400 hover:text-gray-600 text-xl leading-none">✕</button>
    </div>
    <div class="space-y-3 text-sm">
      <div><label class="text-xs text-gray-500 uppercase tracking-wide">제목</label>
        <input id="modalTitleInput" class="w-full border rounded-lg px-3 py-1.5 mt-1 focus:outline-none focus:ring-2 focus:ring-teal-400"></div>
      <div><label class="text-xs text-gray-500 uppercase tracking-wide">상태</label>
        <div class="flex gap-2 mt-1">
          <button data-s="TODO"  class="status-btn px-3 py-1 rounded-lg text-xs border font-semibold">TODO</button>
          <button data-s="DOING" class="status-btn px-3 py-1 rounded-lg text-xs border font-semibold">DOING</button>
          <button data-s="DONE"  class="status-btn px-3 py-1 rounded-lg text-xs border font-semibold">DONE</button>
        </div>
      </div>
      <p id="modalMeta" class="text-xs text-gray-400"></p>
    </div>
    <div class="flex justify-between pt-2">
      <button id="modalDelete" class="text-red-500 text-sm hover:text-red-700">🗑 삭제</button>
      <button id="modalSave" class="bg-teal-600 text-white px-4 py-1.5 rounded-lg text-sm font-semibold hover:bg-teal-700">저장</button>
    </div>
  </div>
</div>
<script src="/js/api.js"></script>
<script>
  if (!getToken()) location.href = "/login.html";
  const user = getUser();
  if (!user || !user.team_id) location.href = "/team.html";
  const teamId = user.team_id;
  let tasks = [], members = [], currentFilter = "", dragId = null, modalTask = null;

  document.getElementById("userEmailDisplay").textContent = user?.email || "";
  document.getElementById("menuBtn").addEventListener("click", () => document.getElementById("mobileMenu").classList.toggle("hidden"));
  document.getElementById("mobileUser").textContent = user?.email || "";
  [document.getElementById("logoutBtn"), document.getElementById("mobileLogout")].forEach(btn =>
    btn?.addEventListener("click", async () => {
      await apiFetch("/auth/logout", { method: "POST" }); removeToken(); removeUser(); location.href = "/login.html";
    })
  );

  async function loadTeam() {
    const [t, m] = await Promise.all([apiJSON("/teams/" + teamId), apiJSON("/teams/" + teamId + "/members")]);
    if (t) document.getElementById("teamName").textContent = t.name + " 팀";
    if (m) {
      members = m;
      // assignee 드롭다운 업데이트
      document.querySelectorAll(".assignee-select").forEach(sel => {
        const cur = sel.value;
        sel.innerHTML = '<option value="">미할당</option>';
        m.forEach(mb => {
          const opt = document.createElement("option");
          opt.value = mb.id;
          opt.textContent = mb.id === user.id ? "@me (" + mb.email.split("@")[0] + ")" : "@" + mb.email.split("@")[0];
          if (mb.id === user.id) opt.selected = true; // 기본 @me
          sel.appendChild(opt);
        });
      });
    }
  }

  async function loadTasks() {
    const q = currentFilter ? "?filter=" + currentFilter : "";
    const data = await apiJSON("/teams/" + teamId + "/tasks" + q);
    if (!data) return;
    tasks = data; render();
  }

  const colColors = { TODO: "bg-white border", DOING: "bg-white border", DONE: "bg-white border" };

  function render() {
    ["TODO", "DOING", "DONE"].forEach(s => {
      const col = tasks.filter(t => t.status === s);
      document.getElementById("cnt-" + s).textContent = col.length;
      const container = document.getElementById("cards-" + s);
      container.innerHTML = "";
      if (col.length === 0) {
        container.innerHTML = `<div class="text-center py-6 text-gray-300 text-sm">📋<br>카드 없음</div>`;
        return;
      }
      col.forEach(t => {
        const assigneeName = t.assignee_id
          ? (t.assignee_id === user.id ? "@me" : "@" + (members.find(m => m.id === t.assignee_id)?.email.split("@")[0] || t.assignee_id))
          : "⚠ 미할당";
        const div = document.createElement("div");
        div.className = "card bg-white border border-gray-200 rounded-lg p-3 text-sm cursor-pointer hover:border-teal-400 hover:shadow-sm";
        div.draggable = true;
        div.dataset.id = t.id;
        div.innerHTML = `<p class="font-medium text-gray-800 leading-snug">${escHtml(t.title)}</p>
          <p class="text-xs text-gray-400 mt-1">#${t.id} · <span class="${t.assignee_id ? "text-teal-600" : "text-orange-400"}">${assigneeName}</span></p>`;
        div.addEventListener("dragstart", () => { dragId = t.id; div.classList.add("dragging"); });
        div.addEventListener("dragend", () => div.classList.remove("dragging"));
        div.addEventListener("click", () => openModal(t));
        container.appendChild(div);
      });
    });
  }

  function escHtml(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  document.querySelectorAll(".col-drop").forEach(col => {
    col.addEventListener("dragover", e => { e.preventDefault(); col.classList.add("over"); });
    col.addEventListener("dragleave", () => col.classList.remove("over"));
    col.addEventListener("drop", async e => {
      e.preventDefault(); col.classList.remove("over");
      const newStatus = col.dataset.status;
      if (!dragId) return;
      const task = tasks.find(t => t.id === dragId);
      if (!task || task.status === newStatus) return;
      task.status = newStatus; render();
      await apiJSON("/tasks/" + dragId + "/status", { method: "PATCH", body: JSON.stringify({ status: newStatus }) });
    });
  });

  document.querySelectorAll(".add-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const col = btn.dataset.col;
      const inlineDiv = document.getElementById("inline-" + col);
      inlineDiv.classList.toggle("hidden");
      inlineDiv.querySelector(".inline-input").focus();
    });
  });

  document.querySelectorAll(".inline-input").forEach(inp => {
    inp.addEventListener("keydown", async e => {
      if (e.key === "Escape") { inp.value = ""; inp.closest("[id^=inline]").classList.add("hidden"); }
      if (e.key === "Enter" && inp.value.trim()) {
        const colDiv = inp.closest(".col-drop");
        const status = colDiv.dataset.status;
        const title = inp.value.trim();
        const assigneeVal = colDiv.querySelector(".assignee-select").value;
        const assignee_id = assigneeVal ? parseInt(assigneeVal) : null;
        inp.value = "";
        colDiv.querySelector(".assignee-select").value = user.id || "";
        colDiv.querySelector("[id^=inline]").classList.add("hidden");
        await apiJSON("/teams/" + teamId + "/tasks", { method: "POST", body: JSON.stringify({ title, assignee_id }) });
        loadTasks();
      }
    });
  });

  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      currentFilter = btn.dataset.f;
      document.querySelectorAll(".filter-btn").forEach(b => {
        b.className = "filter-btn px-3 py-1 rounded-lg font-semibold " + (b.dataset.f === currentFilter ? "bg-gray-900 text-white" : "text-gray-600 hover:bg-gray-100");
      });
      loadTasks();
    });
  });

  function openModal(t) {
    modalTask = t;
    document.getElementById("modal").classList.remove("hidden");
    document.getElementById("modalTitle").textContent = "#" + t.id + " " + t.title;
    document.getElementById("modalTitleInput").value = t.title;
    document.getElementById("modalMeta").textContent = "생성자: " + t.creator_id + " · " + new Date(t.created_at).toLocaleString("ko");
    document.querySelectorAll(".status-btn").forEach(b => {
      const active = b.dataset.s === t.status;
      b.className = "status-btn px-3 py-1 rounded-lg text-xs border font-semibold " +
        (active ? (t.status === "TODO" ? "bg-amber-500 text-white border-amber-500" : t.status === "DOING" ? "bg-blue-500 text-white border-blue-500" : "bg-green-500 text-white border-green-500")
                : "bg-white text-gray-600");
    });
    const isOwnerOrCreator = user.id === t.creator_id;
    document.getElementById("modalDelete").classList.toggle("hidden", !isOwnerOrCreator);
  }
  document.getElementById("modalClose").addEventListener("click", () => document.getElementById("modal").classList.add("hidden"));
  document.querySelectorAll(".status-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".status-btn").forEach(b => b.className = "status-btn px-3 py-1 rounded-lg text-xs border font-semibold bg-white text-gray-600");
      const s = btn.dataset.s;
      btn.className = "status-btn px-3 py-1 rounded-lg text-xs border font-semibold " +
        (s === "TODO" ? "bg-amber-500 text-white border-amber-500" : s === "DOING" ? "bg-blue-500 text-white border-blue-500" : "bg-green-500 text-white border-green-500");
    });
  });
  document.getElementById("modalSave").addEventListener("click", async () => {
    const newTitle = document.getElementById("modalTitleInput").value.trim();
    const newStatus = document.querySelector(".status-btn.bg-amber-500, .status-btn.bg-blue-500, .status-btn.bg-green-500")?.dataset.s;
    if (!newTitle) return;
    await apiJSON("/tasks/" + modalTask.id, { method: "PUT", body: JSON.stringify({ title: newTitle }) });
    if (newStatus && newStatus !== modalTask.status)
      await apiJSON("/tasks/" + modalTask.id + "/status", { method: "PATCH", body: JSON.stringify({ status: newStatus }) });
    document.getElementById("modal").classList.add("hidden");
    loadTasks();
  });
  document.getElementById("modalDelete").addEventListener("click", async () => {
    if (!confirm("이 카드를 삭제하시겠습니까? 되돌릴 수 없습니다.")) return;
    await apiJSON("/tasks/" + modalTask.id, { method: "DELETE" });
    document.getElementById("modal").classList.add("hidden");
    loadTasks();
  });

  loadTeam(); loadTasks();
</script>
</body>
</html>
