<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>TaskFlow — 로그인</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center">
<div class="w-full max-w-sm bg-white rounded-2xl shadow-md p-8">
  <h1 class="text-2xl font-bold text-center text-teal-600 mb-6">TaskFlow</h1>
  <h2 class="text-lg font-semibold text-center mb-6">로그인</h2>
  <div id="error" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm"></div>
  <form id="loginForm" class="space-y-4">
    <input id="email" type="email" placeholder="이메일 입력" required
      class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-teal-400">
    <input id="password" type="password" placeholder="비밀번호" required
      class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-teal-400">
    <button id="submitBtn" type="submit"
      class="w-full bg-teal-600 text-white py-2 rounded-lg font-semibold hover:bg-teal-700 transition">
      로그인
    </button>
  </form>
  <p class="text-center text-sm mt-4 text-gray-500">계정이 없으신가요? <a href="/signup.html" class="text-teal-600 hover:underline">회원가입</a></p>
</div>
<script src="/js/api.js"></script>
<script>
  if (getToken()) location.href = "/team.html";
  document.getElementById("loginForm").addEventListener("submit", async e => {
    e.preventDefault();
    const btn = document.getElementById("submitBtn");
    const errEl = document.getElementById("error");
    btn.textContent = "처리 중…"; btn.disabled = true; errEl.classList.add("hidden");
    try {
      const data = await apiJSON("/auth/login", {
        method: "POST",
        body: JSON.stringify({ email: document.getElementById("email").value, password: document.getElementById("password").value })
      });
      if (!data) return;
      setToken(data.token); setUser(data.user);
      location.href = data.user.team_id ? "/kanban.html" : "/team.html";
    } catch (err) {
      errEl.textContent = err.message || "오류가 발생했습니다"; errEl.classList.remove("hidden");
      btn.textContent = "로그인"; btn.disabled = false;
    }
  });
</script>
</body>
</html>
