<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>TaskFlow — 팀 선택</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50">
<header class="bg-white border-b px-6 py-3 flex justify-between items-center">
  <span class="text-teal-600 font-bold text-lg">TaskFlow</span>
  <div class="flex items-center gap-4">
    <span id="userEmail" class="text-sm text-gray-500"></span>
    <button id="logoutBtn" class="text-sm text-gray-500 hover:text-gray-700">로그아웃</button>
  </div>
</header>
<main class="max-w-lg mx-auto mt-12 px-4 space-y-6">
  <div id="notice" class="p-3 bg-blue-50 border border-blue-200 text-blue-700 rounded-lg text-sm">
    ℹ 아직 팀에 소속되지 않았습니다. 팀을 만들거나 초대코드로 합류하세요.
  </div>
  <!-- 팀 만들기 -->
  <div class="bg-white rounded-2xl shadow-md p-6">
    <h2 class="font-semibold text-gray-800 mb-4">+ 새 팀 만들기</h2>
    <div id="createError" class="hidden mb-3 text-sm text-red-600"></div>
    <form id="createForm" class="flex gap-2">
      <input id="teamName" placeholder="팀 이름 (1-30자)" maxlength="30"
        class="flex-1 border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-400 text-sm">
      <button class="bg-teal-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-teal-700">만들기</button>
    </form>
    <div id="inviteResult" class="hidden mt-4 p-3 bg-green-50 border border-green-200 rounded-lg">
      <p class="text-sm text-green-700 font-semibold">✓ 팀이 생성되었습니다!</p>
      <p class="text-sm text-gray-600 mt-1">초대코드: <span id="inviteCode" class="font-mono font-bold"></span>
        <button id="copyBtn" class="ml-2 text-teal-600 text-xs hover:underline">📋 복사</button></p>
      <a id="gotoKanban" href="/kanban.html" class="mt-3 block text-center bg-teal-600 text-white py-2 rounded-lg text-sm font-semibold hover:bg-teal-700">칸반 시작하기 →</a>
    </div>
  </div>
  <!-- 초대코드 합류 -->
  <div class="bg-white rounded-2xl shadow-md p-6">
    <h2 class="font-semibold text-gray-800 mb-4">초대코드로 합류</h2>
    <div id="joinError" class="hidden mb-3 text-sm text-red-600"></div>
    <form id="joinForm" class="flex gap-2">
      <input id="inviteInput" placeholder="ABCD-1234" maxlength="9" style="text-transform:uppercase"
        class="flex-1 border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-400 text-sm font-mono">
      <button class="bg-orange-500 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-orange-600">합류</button>
    </form>
    <p class="text-xs text-gray-400 mt-1">형식: 대문자 4 + 숫자 4 (하이픈 포함)</p>
  </div>
</main>
<script src="/js/api.js"></script>
<script>
  if (!getToken()) location.href = "/login.html";
  const user = getUser();
  if (user) {
    document.getElementById("userEmail").textContent = user.email;
    if (user.team_id) location.href = "/kanban.html";
  }
  document.getElementById("logoutBtn").addEventListener("click", async () => {
    await apiFetch("/auth/logout", { method: "POST" });
    removeToken(); removeUser(); location.href = "/login.html";
  });
  const INVITE_RE = /^[A-Z]{4}-[0-9]{4}$/;
  document.getElementById("inviteInput").addEventListener("input", e => {
    e.target.value = e.target.value.toUpperCase();
  });
  document.getElementById("createForm").addEventListener("submit", async e => {
    e.preventDefault();
    const name = document.getElementById("teamName").value.trim();
    const errEl = document.getElementById("createError");
    errEl.classList.add("hidden");
    if (!name) return;
    try {
      const data = await apiJSON("/teams", { method: "POST", body: JSON.stringify({ name }) });
      if (!data) return;
      const u = getUser(); u.team_id = data.id; setUser(u);
      document.getElementById("inviteCode").textContent = data.invite_code;
      document.getElementById("inviteResult").classList.remove("hidden");
      document.getElementById("copyBtn").addEventListener("click", () => navigator.clipboard.writeText(data.invite_code));
    } catch (err) { errEl.textContent = err.message || "오류가 발생했습니다"; errEl.classList.remove("hidden"); }
  });
  document.getElementById("joinForm").addEventListener("submit", async e => {
    e.preventDefault();
    const code = document.getElementById("inviteInput").value.trim();
    const errEl = document.getElementById("joinError");
    errEl.classList.add("hidden");
    if (!INVITE_RE.test(code)) { errEl.textContent = "⚠ 형식이 올바르지 않습니다. 예: FRNT-2026"; errEl.classList.remove("hidden"); return; }
    try {
      const data = await apiJSON("/teams/join", { method: "POST", body: JSON.stringify({ invite_code: code }) });
      if (!data) return;
      const u = getUser(); u.team_id = data.team.id; setUser(u);
      location.href = "/kanban.html";
    } catch (err) { errEl.textContent = err.message || "오류가 발생했습니다"; errEl.classList.remove("hidden"); }
  });
</script>
</body>
</html>
