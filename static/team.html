<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>TaskFlow — 팀 선택</title>
<script>
  (function(){const t=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');if(t==='dark')document.documentElement.classList.add('dark');})();
</script>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:'class'}</script>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 transition-colors">
<header class="bg-white dark:bg-gray-800 border-b dark:border-gray-700 px-6 py-3 flex justify-between items-center">
  <span class="bg-teal-600 text-white font-bold px-3 py-1 rounded-lg text-sm tracking-wide">TaskFlow</span>
  <div class="flex items-center gap-3">
    <span id="userEmail" class="text-sm text-gray-500 dark:text-gray-400"></span>
    <button id="themeBtn" onclick="toggleTheme()" class="text-xl p-1 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition">🌙</button>
    <button id="logoutBtn" class="text-sm text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200">로그아웃</button>
  </div>
</header>
<main class="max-w-2xl mx-auto mt-12 px-4 space-y-6">
  <div id="notice" class="p-3 bg-blue-50 dark:bg-blue-900/30 border border-blue-200 dark:border-blue-700 text-blue-700 dark:text-blue-300 rounded-lg text-sm">
    ℹ 아직 팀에 소속되지 않았습니다. 팀을 만들거나 초대코드로 합류하세요.
  </div>
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-md p-6 border-2 border-dashed border-gray-200 dark:border-gray-700">
      <h2 class="font-bold text-gray-800 dark:text-gray-100 mb-4 text-center">+ 새 팀 만들기</h2>
      <div id="createError" class="hidden mb-3 text-sm text-red-600 dark:text-red-400"></div>
      <form id="createForm" class="space-y-3">
        <input id="teamName" placeholder="팀 이름 (1-30자)" maxlength="30"
          class="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-400 text-sm placeholder-gray-400 dark:placeholder-gray-500">
        <button class="w-full bg-teal-600 text-white py-2 rounded-lg text-sm font-semibold hover:bg-teal-700">만들기</button>
      </form>
      <div id="inviteResult" class="hidden mt-4 p-3 bg-green-50 dark:bg-green-900/30 border border-green-200 dark:border-green-700 rounded-lg">
        <p class="text-sm text-green-700 dark:text-green-400 font-semibold">✓ 팀이 생성되었습니다!</p>
        <p class="text-sm text-gray-600 dark:text-gray-400 mt-2">초대코드</p>
        <p class="font-mono text-xl font-bold text-teal-700 dark:text-teal-400 tracking-widest mt-1">
          <span id="inviteCode"></span>
          <button id="copyBtn" class="ml-2 text-xs text-teal-600 border border-teal-300 rounded px-1.5 py-0.5 hover:bg-teal-50 dark:hover:bg-teal-900/30">📋 복사</button>
        </p>
        <a href="/kanban.html" class="mt-3 block text-center bg-teal-600 text-white py-2 rounded-lg text-sm font-semibold hover:bg-teal-700">칸반 시작하기 →</a>
      </div>
    </div>
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-md p-6 border-2 border-dashed border-gray-200 dark:border-gray-700">
      <h2 class="font-bold text-gray-800 dark:text-gray-100 mb-4 text-center">초대코드로 합류</h2>
      <div id="joinError" class="hidden mb-3 text-sm text-red-600 dark:text-red-400"></div>
      <form id="joinForm" class="space-y-3">
        <input id="inviteInput" placeholder="ABCD-1234" maxlength="9" style="text-transform:uppercase"
          class="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-400 text-sm font-mono text-center text-lg tracking-widest placeholder-gray-400 dark:placeholder-gray-500">
        <p class="text-xs text-gray-400 dark:text-gray-500 text-center">형식: 대문자 4 + 숫자 4 (하이픈 포함)</p>
        <button class="w-full bg-teal-600 text-white py-2 rounded-lg text-sm font-semibold hover:bg-teal-700">합류</button>
      </form>
    </div>
  </div>
</main>
<script src="/js/api.js"></script>
<script src="/js/theme.js"></script>
<script>
  if (!getToken()) location.href = "/login.html";
  const user = getUser();
  if (user) { document.getElementById("userEmail").textContent = user.email; if (user.team_id) location.href = "/kanban.html"; }
  document.getElementById("logoutBtn").addEventListener("click", async () => { await apiFetch("/auth/logout",{method:"POST"}); removeToken(); removeUser(); location.href="/login.html"; });
  const INVITE_RE = /^[A-Z]{4}-[0-9]{4}$/;
  document.getElementById("inviteInput").addEventListener("input", e => { e.target.value = e.target.value.toUpperCase(); });
  document.getElementById("createForm").addEventListener("submit", async e => {
    e.preventDefault(); const name = document.getElementById("teamName").value.trim(); const errEl = document.getElementById("createError"); errEl.classList.add("hidden"); if (!name) return;
    try { const data = await apiJSON("/teams",{method:"POST",body:JSON.stringify({name})}); if (!data) return; const u=getUser(); u.team_id=data.id; setUser(u); document.getElementById("inviteCode").textContent=data.invite_code; document.getElementById("inviteResult").classList.remove("hidden"); document.getElementById("copyBtn").addEventListener("click",()=>{navigator.clipboard.writeText(data.invite_code); document.getElementById("copyBtn").textContent="✓ 복사됨";}); }
    catch (err) { errEl.textContent=err.message||"오류가 발생했습니다"; errEl.classList.remove("hidden"); }
  });
  document.getElementById("joinForm").addEventListener("submit", async e => {
    e.preventDefault(); const code=document.getElementById("inviteInput").value.trim(); const errEl=document.getElementById("joinError"); errEl.classList.add("hidden");
    if (!INVITE_RE.test(code)) { errEl.textContent="⚠ 형식이 올바르지 않습니다. 예: FRNT-2026"; errEl.classList.remove("hidden"); return; }
    try { const data=await apiJSON("/teams/join",{method:"POST",body:JSON.stringify({invite_code:code})}); if (!data) return; const u=getUser(); u.team_id=data.team.id; setUser(u); location.href="/kanban.html"; }
    catch (err) { errEl.textContent=err.message||"오류가 발생했습니다"; errEl.classList.remove("hidden"); }
  });
</script>
</body>
</html>
